# pull request: checks + build + test + worker preview from head commit; push to master: production deploy
name: CI & CD

on:
    pull_request:
    push:
        branches: [master]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write
    checks: write

env:
    TURBO_TELEMETRY_DISABLED: "1"
    PDFLY_DOCKER_CACHE_ROOT: .tmp/docker-buildx-cache
    PDFLY_QPDF_JOBS: "2"
    PDFLY_GHOSTSCRIPT_JOBS: "2"
    # pull request workflows default to refs/pull/n/merge; use head so builds/previews match the branch
    SOURCE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
    checks:
        name: ${{ matrix.check.name }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                check:
                    - name: Type Check
                      command: pnpm run typecheck
                    - name: Lint
                      command: pnpm run lint
                    - name: Format
                      command: pnpm run format:check

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ env.SOURCE_SHA }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache Turbo
              uses: actions/cache@v4
              with:
                  path: .turbo/cache
                  key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-${{ env.SOURCE_SHA }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-
                      turbo-${{ runner.os }}-

            - name: Run ${{ matrix.check.name }}
              run: ${{ matrix.check.command }}

    build:
        name: Build and Test
        runs-on: ubuntu-latest
        needs: checks

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ env.SOURCE_SHA }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Cache qpdf Buildx layers
              uses: actions/cache@v4
              with:
                  path: .tmp/docker-buildx-cache/qpdf-prd
                  key: docker-buildx-qpdf-${{ runner.os }}-${{ hashFiles('packages/pdfly-wasm/native/qpdf/docker.Dockerfile', 'packages/pdfly-wasm/native/qpdf/**', 'packages/pdfly-wasm/tools/vendor/upstreams.ts') }}
                  restore-keys: |
                      docker-buildx-qpdf-${{ runner.os }}-

            - name: Cache Ghostscript Buildx layers
              uses: actions/cache@v4
              with:
                  path: .tmp/docker-buildx-cache/ghostscript-prd
                  key: docker-buildx-ghostscript-${{ runner.os }}-${{ hashFiles('packages/pdfly-wasm/native/ghostscript/docker.Dockerfile', 'packages/pdfly-wasm/native/ghostscript/**', 'packages/pdfly-wasm/tools/vendor/upstreams.ts') }}
                  restore-keys: |
                      docker-buildx-ghostscript-${{ runner.os }}-

            - name: Cache Turbo
              uses: actions/cache@v4
              with:
                  path: .turbo/cache
                  key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-${{ env.SOURCE_SHA }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-
                      turbo-${{ runner.os }}-

            - name: Run build
              run: pnpm turbo build --filter=!desktop

            - name: Run tests
              run: pnpm run test

            - name: Upload compression results artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: compression-results
                  path: packages/pdfly-wasm/test-report/compression-results.xml
                  if-no-files-found: ignore

            - name: Download master compression baseline
              if: github.event_name == 'pull_request'
              continue-on-error: true
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  RUN_ID=$(gh run list \
                      --repo "$GITHUB_REPOSITORY" \
                      --branch master \
                      --workflow ci-cd.yml \
                      --status success \
                      --limit 1 \
                      --json databaseId \
                      --jq '.[0].databaseId')
                  if [ -n "$RUN_ID" ]; then
                      gh run download "$RUN_ID" \
                          --repo "$GITHUB_REPOSITORY" \
                          --name compression-results \
                          --dir /tmp/compression-baseline
                  fi

            - name: Generate compression summary
              if: always()
              run: |
                  BASELINE_FLAG=""
                  if [ -f "/tmp/compression-baseline/compression-results.xml" ]; then
                      BASELINE_FLAG="--baseline /tmp/compression-baseline/compression-results.xml"
                  fi
                  python3 packages/pdfly-wasm/tools/dev/generate-compression-summary.py $BASELINE_FLAG

            - name: Upload compression summary artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: compression-summary
                  path: packages/pdfly-wasm/test-report/compression-summary.md
                  if-no-files-found: ignore

            - name: Post compression summary as PR comment
              if: always() && github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require("fs");
                      const path = require("path");
                      const scriptPath = path.join(process.env.GITHUB_WORKSPACE, ".github/scripts/post-compression-comment.js");
                      const body = fs.readFileSync(scriptPath, "utf8");
                      const run = new Function("github", "context", "core", "return (async function () {\n" + body + "\n})();");
                      await run(github, context, core);

            - name: Check package contract
              run: pnpm --filter @pdfly/wasm package:check

    desktop:
        name: Desktop Build
        runs-on: ubuntu-latest
        needs: checks

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ env.SOURCE_SHA }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: apps/desktop/src-tauri

            - name: Install Tauri system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

            - name: Build desktop
              run: pnpm --filter desktop build

            - name: Deploy Cloudflare Worker (production)
              if: github.event_name == 'push' && github.ref == 'refs/heads/master'
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: deploy

            - name: Upload Cloudflare Worker preview
              id: cf_preview
              if: >
                  github.event_name == 'pull_request' &&
                  github.event.pull_request.base.ref == 'master' &&
                  github.event.pull_request.head.repo.full_name == github.repository
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: versions upload --preview-alias pr-${{ github.event.pull_request.number }} --message "PR ${{ github.event.pull_request.number }}"

            - name: Log Cloudflare Worker preview step outputs
              if: >
                  github.event_name == 'pull_request' &&
                  github.event.pull_request.base.ref == 'master' &&
                  github.event.pull_request.head.repo.full_name == github.repository
              env:
                  CF_PREVIEW_OUTPUTS_JSON: ${{ toJSON(steps.cf_preview.outputs) }}
              run: |
                  set -euo pipefail
                  echo "steps.cf_preview.outputs"
                  printf '%s' "${CF_PREVIEW_OUTPUTS_JSON}" | jq .

            - name: Upsert Worker preview comment on PR
              if: >
                  github.event_name == 'pull_request' &&
                  github.event.pull_request.base.ref == 'master' &&
                  github.event.pull_request.head.repo.full_name == github.repository &&
                  steps.cf_preview.conclusion == 'success'
              uses: actions/github-script@v7
              env:
                  DEPLOYMENT_URL: ${{ steps.cf_preview.outputs.deployment-url }}
                  DEPLOYMENT_ALIAS_URL: ${{ steps.cf_preview.outputs.deployment-alias-url }}
                  VERSION_ID: ${{ steps.cf_preview.outputs.version-id }}
                  COMMAND_OUTPUT: ${{ steps.cf_preview.outputs.command-output }}
                  SOURCE_SHA: ${{ env.SOURCE_SHA }}
              with:
                  script: |
                      const fs = require("fs");
                      const path = require("path");
                      const scriptPath = path.join(process.env.GITHUB_WORKSPACE, ".github/scripts/post-preview-comment.js");
                      const body = fs.readFileSync(scriptPath, "utf8");
                      const run = new Function(
                          "github",
                          "context",
                          "core",
                          "return (async function () {\n" + body + "\n})();",
                      );
                      await run(github, context, core);
