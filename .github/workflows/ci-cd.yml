# pull request: checks + build + test + worker preview from head commit; push to master: production deploy
name: CI & CD

on:
    pull_request:
    push:
        branches: [master]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write
    checks: write

env:
    EMSDK_VERSION: 5.0.6
    QPDF_VERSION: a898bb3a7289d1d05789d6d3f0d5dd534943a8da
    TURBO_TELEMETRY_DISABLED: "1"
    # pull request workflows default to refs/pull/n/merge; use head so builds/previews match the branch
    SOURCE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
    checks:
        name: ${{ matrix.check.name }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                check:
                    - name: Type Check
                      command: pnpm run typecheck
                    - name: Lint
                      command: pnpm run lint
                    - name: Format
                      command: pnpm run format:check

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ env.SOURCE_SHA }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache Turbo
              uses: actions/cache@v4
              with:
                  path: .turbo/cache
                  key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-${{ env.SOURCE_SHA }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-
                      turbo-${{ runner.os }}-

            - name: Run ${{ matrix.check.name }}
              run: ${{ matrix.check.command }}

    build:
        name: Build and Test
        runs-on: ubuntu-latest
        needs: checks

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ env.SOURCE_SHA }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .node-version
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache Emscripten SDK
              uses: actions/cache@v4
              with:
                  path: .cache/emsdk
                  key: emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}

            - name: Cache qpdf source
              uses: actions/cache@v4
              with:
                  path: vendor/qpdf
                  key: qpdf-${{ env.QPDF_VERSION }}

            - name: Cache Turbo
              uses: actions/cache@v4
              with:
                  path: .turbo/cache
                  key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-${{ env.SOURCE_SHA }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'pnpm-workspace.yaml', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-
                      turbo-${{ runner.os }}-

            - name: Cache WASM build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      packages/pdfly-wasm/wasm/cmake-build
                      packages/pdfly-wasm/build/wasm
                  key: wasm-build-${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}-qpdf-${{ env.QPDF_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'packages/pdfly-wasm/package.json', 'packages/pdfly-wasm/tsdown.config.ts', 'packages/pdfly-wasm/src/**', 'packages/pdfly-wasm/wasm/**') }}
                  restore-keys: |
                      wasm-build-${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}-qpdf-${{ env.QPDF_VERSION }}-
                      wasm-build-${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}-

            - name: Ensure CMake
              run: |
                  set -euo pipefail
                  if ! command -v cmake >/dev/null 2>&1; then
                    echo "CMake not found, installing..."
                    sudo apt-get update
                    sudo apt-get install -y cmake
                  else
                    echo "CMake already installed."
                  fi

            - name: Setup Emscripten
              run: |
                  set -euo pipefail

                  if [ ! -d .cache/emsdk/.git ]; then
                      git clone --depth 1 https://github.com/emscripten-core/emsdk.git .cache/emsdk
                  fi

                  .cache/emsdk/emsdk install "$EMSDK_VERSION"
                  .cache/emsdk/emsdk activate "$EMSDK_VERSION"

            - name: Fetch qpdf source
              run: |
                  set -euo pipefail

                  if [ ! -d vendor/qpdf/.git ]; then
                      mkdir -p vendor
                      git clone --filter=blob:none https://github.com/qpdf/qpdf.git vendor/qpdf
                  fi

                  git -C vendor/qpdf checkout "$QPDF_VERSION"

            - name: Run build
              run: |
                  set -euo pipefail
                  source .cache/emsdk/emsdk_env.sh
                  pnpm run build

            - name: Run tests
              run: |
                  set -euo pipefail
                  source .cache/emsdk/emsdk_env.sh
                  pnpm run test

            - name: Upload compression results artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: compression-results
                  path: packages/pdfly-wasm/test-report/compression-results.xml
                  if-no-files-found: ignore

            - name: Generate compression summary
              if: always()
              run: python3 packages/pdfly-wasm/script/generate-compression-summary.py

            - name: Upload compression summary artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: compression-summary
                  path: packages/pdfly-wasm/test-report/compression-summary.md
                  if-no-files-found: ignore

            - name: Check package contract
              run: pnpm --filter @pdfly/wasm package:check

            - name: Deploy Cloudflare Worker (production)
              if: github.event_name == 'push' && github.ref == 'refs/heads/master'
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: deploy

            - name: Upload Cloudflare Worker preview
              id: cf_preview
              if: >
                  github.event_name == 'pull_request' &&
                  github.event.pull_request.base.ref == 'master' &&
                  github.event.pull_request.head.repo.full_name == github.repository
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: versions upload --preview-alias pr-${{ github.event.pull_request.number }} --message "PR ${{ github.event.pull_request.number }}"

            - name: Log Cloudflare Worker preview step outputs
              if: >
                  github.event_name == 'pull_request' &&
                  github.event.pull_request.base.ref == 'master' &&
                  github.event.pull_request.head.repo.full_name == github.repository
              env:
                  CF_PREVIEW_OUTPUTS_JSON: ${{ toJSON(steps.cf_preview.outputs) }}
              run: |
                  set -euo pipefail
                  echo "steps.cf_preview.outputs"
                  printf '%s' "${CF_PREVIEW_OUTPUTS_JSON}" | jq .

            - name: Upsert Worker preview comment on PR
              if: >
                  github.event_name == 'pull_request' &&
                  github.event.pull_request.base.ref == 'master' &&
                  github.event.pull_request.head.repo.full_name == github.repository &&
                  steps.cf_preview.conclusion == 'success'
              uses: actions/github-script@v7
              env:
                  DEPLOYMENT_URL: ${{ steps.cf_preview.outputs.deployment-url }}
                  DEPLOYMENT_ALIAS_URL: ${{ steps.cf_preview.outputs.deployment-alias-url }}
                  VERSION_ID: ${{ steps.cf_preview.outputs.version-id }}
                  COMMAND_OUTPUT: ${{ steps.cf_preview.outputs.command-output }}
                  SOURCE_SHA: ${{ env.SOURCE_SHA }}
              with:
                  script: |
                      const fs = require("fs");
                      const path = require("path");
                      const scriptPath = path.join(process.env.GITHUB_WORKSPACE, ".github/scripts/post-preview-comment.js");
                      const body = fs.readFileSync(scriptPath, "utf8");
                      const run = new Function(
                          "github",
                          "context",
                          "core",
                          "return (async function () {\n" + body + "\n})();",
                      );
                      await run(github, context, core);
