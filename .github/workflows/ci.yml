name: CI

on:
    pull_request:
    push:
        branches: [master]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    EMSDK_VERSION: 5.0.6
    NODE_VERSION: 22
    QPDF_VERSION: a898bb3a7289d1d05789d6d3f0d5dd534943a8da
    TURBO_TELEMETRY_DISABLED: "1"

jobs:
    checks:
        name: ${{ matrix.check.name }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                check:
                    - name: Type Check
                      command: pnpm run typecheck
                    - name: Lint
                      command: pnpm run lint
                    - name: Tests
                      command: pnpm run test
                    - name: Format
                      command: pnpm run format:check

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ${{ matrix.check.name }}
              run: ${{ matrix.check.command }}

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: checks

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache Emscripten SDK
              uses: actions/cache@v4
              with:
                  path: .cache/emsdk
                  key: emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}

            - name: Cache qpdf source
              uses: actions/cache@v4
              with:
                  path: vendor/qpdf
                  key: qpdf-${{ env.QPDF_VERSION }}

            - name: Ensure CMake
              run: |
                  set -euo pipefail
                  if ! command -v cmake >/dev/null 2>&1; then
                    echo "CMake not found, installing..."
                    sudo apt-get update
                    sudo apt-get install -y cmake
                  else
                    echo "CMake already installed."
                  fi

            - name: Setup Emscripten
              run: |
                  set -euo pipefail

                  if [ ! -d .cache/emsdk/.git ]; then
                      git clone --depth 1 https://github.com/emscripten-core/emsdk.git .cache/emsdk
                  fi

                  .cache/emsdk/emsdk install "$EMSDK_VERSION"
                  .cache/emsdk/emsdk activate "$EMSDK_VERSION"

            - name: Fetch qpdf source
              run: |
                  set -euo pipefail

                  if [ ! -d vendor/qpdf/.git ]; then
                      mkdir -p vendor
                      git clone --filter=blob:none https://github.com/qpdf/qpdf.git vendor/qpdf
                  fi

                  git -C vendor/qpdf checkout "$QPDF_VERSION"

            - name: Run build
              run: |
                  set -euo pipefail
                  source .cache/emsdk/emsdk_env.sh
                  pnpm run build

            - name: Validate package metadata
              run: pnpm --filter @pdfly/wasm validate

            - name: Check package contents
              run: pnpm --filter @pdfly/wasm pack --dry-run
         